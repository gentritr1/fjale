name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cache-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
      - name: Require cache bump for pull-request runtime changes
        if: github.event_name == 'pull_request'
        run: node scripts/check-cache-version-bump.mjs ${{ github.event.pull_request.base.sha }}
      - name: Require cache bump for pushed runtime changes
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: node scripts/check-cache-version-bump.mjs ${{ github.event.before }}

  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The supported minimum (package.json engines) and current LTS.
        node-version: ["20.x", "24.x"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm run check
